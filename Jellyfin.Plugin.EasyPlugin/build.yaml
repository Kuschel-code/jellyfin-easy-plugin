targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Kuschel-code"
overview: "Show, hide and reorder plugin entries in the Jellyfin admin sidebar."
description: >
  Lets you choose which plugin configuration entries are visible in the admin
  sidebar and in what order, from the plugin's own settings page. The client
  script is injected in-memory via the File Transformation plugin, so index.html
  is never patched on disk and server updates never overwrite it.
category: "General"
artifacts:
  - "Jellyfin.Plugin.EasyPlugin.dll"
changelog: >
  0.0.3.0 - Changes now apply to the sidebar instantly, with no page reload: toggling
  a plugin on/off, adding/removing an "extra", reordering and the master enable switch
  all reflect live (the config page signals the injected script, which re-fetches and
  re-applies). Removing a previously-added plugin now also removes its sidebar entry
  live. Builds on 0.0.2.0 (pin below logo, one row per plugin, "Add another plugin").
