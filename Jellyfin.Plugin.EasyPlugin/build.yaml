version: "0.0.2.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "Kuschel-code"
overview: "Show, hide and reorder plugin entries in the Jellyfin admin sidebar."
description: >
  Lets you choose which plugin configuration entries are visible in the admin
  sidebar and in what order, from the plugin's own settings page. The client
  script is injected in-memory via the File Transformation plugin, so index.html
  is never patched on disk and server updates never overwrite it.
category: "General"
artifacts:
  - "Jellyfin.Plugin.EasyPlugin.dll"
changelog: >
  0.0.2.0 - Pin the plugins section just below the server logo (never above it).
  One row per plugin on the config page (multi-page plugins are no longer grouped).
  Plugins that aren't normally in the sidebar moved into a collapsible "Add another
  plugin" section, so the main list shows only the active sidebar entries. Disabling
  now fully restores the original sidebar.
