name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build Jellyfin.Plugin.EasyPlugin/Jellyfin.Plugin.EasyPlugin.csproj -c Release

      - name: Package plugin
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GUID="f4acffe0-0347-4b20-a69d-d50d6b2b4a7e"
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DLL="Jellyfin.Plugin.EasyPlugin/bin/Release/net9.0/Jellyfin.Plugin.EasyPlugin.dll"

          mkdir -p package
          cp "$DLL" package/

          # meta.json so the zip is a valid Jellyfin plugin folder (no .pdb / .deps.json).
          printf '%s' "{\"category\":\"General\",\"guid\":\"$GUID\",\"name\":\"Easy Plugin\",\"description\":\"Show, hide and reorder plugin configuration entries in the Jellyfin admin sidebar.\",\"overview\":\"Tidy the admin sidebar: hide and reorder plugin entries.\",\"owner\":\"Kuschel-code\",\"targetAbi\":\"10.11.0.0\",\"framework\":\"net9.0\",\"version\":\"${VERSION}.0\",\"changelog\":\"Release ${VERSION}\",\"timestamp\":\"$TS\"}" > package/meta.json

          cd package
          ZIP="easy-plugin_${VERSION}.zip"
          zip "$ZIP" Jellyfin.Plugin.EasyPlugin.dll meta.json
          MD5="$(md5sum "$ZIP" | awk '{print $1}')"
          echo "$MD5" > "${ZIP}.md5"
          {
            echo "### Plugin package"
            echo "- file: \`$ZIP\` (Jellyfin.Plugin.EasyPlugin.dll + meta.json)"
            echo "- md5: \`$MD5\`  <- paste into manifest.json"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            package/*.zip
            package/*.md5
